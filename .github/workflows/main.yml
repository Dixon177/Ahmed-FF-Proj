name: Ahmed-FF-VIP-V38
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>

          @interface AhmedMenu : UIView
          @property (nonatomic, strong) UIView *panel;
          @end

          @implementation AhmedMenu
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.userInteractionEnabled = YES;
                  [self setupUI];
              }
              return self;
          }

          - (void)setupUI {
              UIButton *btn = [UIButton buttonWithType:UIButtonTypeCustom];
              btn.frame = CGRectMake(30, 150, 60, 60);
              btn.backgroundColor = [UIColor redColor];
              btn.layer.cornerRadius = 30;
              [btn setTitle:@"AHMED" forState:UIControlStateNormal];
              [btn addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:btn];

              self.panel = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 280, 500)];
              self.panel.center = self.center;
              self.panel.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.95];
              self.panel.layer.cornerRadius = 20;
              self.panel.layer.borderColor = [UIColor redColor].CGColor;
              self.panel.layer.borderWidth = 2;
              self.panel.hidden = YES;

              UILabel *t = [[UILabel alloc] initWithFrame:CGRectMake(0, 15, 280, 30)];
              t.text = @"AHMED GHOST VIP V38";
              t.textColor = [UIColor whiteColor];
              t.textAlignment = NSTextAlignmentCenter;
              [self.panel addSubview:t];

              [self addOption:@"Headshot 80%" y:70 tag:1];
              [self addOption:@"Antenna View" y:120 tag:2];
              [self addOption:@"No Recoil" y:170 tag:3];
              [self addOption:@"Remove Grass" y:220 tag:4];
              [self addOption:@"Black Sky" y:270 tag:5];

              UIButton *resetBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              resetBtn.frame = CGRectMake(40, 340, 200, 45);
              resetBtn.backgroundColor = [UIColor orangeColor];
              resetBtn.layer.cornerRadius = 10;
              [resetBtn setTitle:@"Reset Guest Account" forState:UIControlStateNormal];
              [resetBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              [resetBtn addTarget:self action:@selector(resetGuest) forControlEvents:UIControlEventTouchUpInside];
              [self.panel addSubview:resetBtn];

              [self addSubview:self.panel];
          }

          - (void)addOption:(NSString *)name y:(CGFloat)y tag:(int)tag {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(20, y, 180, 30)];
              l.text = name; l.textColor = [UIColor whiteColor];
              [self.panel addSubview:l];
              UISwitch *s = [[UISwitch alloc] initWithFrame:CGRectMake(210, y, 0, 0)];
              s.onTintColor = [UIColor redColor];
              [self.panel addSubview:s];
          }

          - (void)toggle { self.panel.hidden = !self.panel.hidden; }
          - (void)resetGuest {
              NSString *path = [NSHomeDirectory() stringByAppendingPathComponent:@"Documents/com.dts.freefireth"];
              [[NSFileManager defaultManager] removeItemAtPath:path error:nil];
          }
          @end

          __attribute__((constructor)) static void init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *w = [UIApplication sharedApplication].keyWindow ?: [UIApplication sharedApplication].windows.firstObject;
                  if (w) [w addSubview:[[AhmedMenu alloc] initWithFrame:w.bounds]];
              });
          }
          EOF

          clang -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -O3 Tweak.mm -o AhmedTweak.dylib

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed_Dylib_Package
          path: AhmedTweak.dylib
